<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Management System - OOP Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .console {
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            overflow-y: auto;
            max-height: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .console-line {
            margin: 5px 0;
            line-height: 1.6;
        }

        .success {
            color: #00ff00;
        }

        .error {
            color: #ff6b6b;
        }

        .info {
            color: #87ceeb;
        }

        .header {
            color: #ffd700;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
        }

        .section {
            color: #ff69b4;
            margin-top: 15px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px 10px 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            text-align: center;
            margin-bottom: 20px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            color: white;
            margin-bottom: 20px;
        }

        .info-box h3 {
            margin-bottom: 10px;
            color: #ffd700;
        }

        .info-box p {
            line-height: 1.6;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Bank Management System - OOP Project</h1>
        
        <div class="info-box">
            <h3>📚 Project Overview</h3>
            <p>
                This project demonstrates all OOP concepts: <strong>Encapsulation, Inheritance, Polymorphism, Abstraction, Static Methods, Getters & Setters</strong>
            </p>
        </div>

        <div class="button-group">
            <button onclick="runProject()">▶️ Run Project</button>
            <button onclick="clearConsole()">🗑️ Clear Console</button>
        </div>

        <div class="console" id="console"></div>
    </div>

    <script>
        const consoleElement = document.getElementById('console');

        function log(message, type = 'normal') {
            const line = document.createElement('div');
            line.className = `console-line ${type}`;
            line.textContent = message;
            consoleElement.appendChild(line);
            consoleElement.scrollTop = consoleElement.scrollHeight;
        }

        function clearConsole() {
            consoleElement.innerHTML = '';
        }

        function runProject() {
            clearConsole();

            // ========== STEP 1: Base Account Class ==========
            class Account {
                #balance;
                #transactionHistory;
                #accountNumber;
                
                constructor(accountHolder, initialBalance) {
                    this.accountHolder = accountHolder;
                    this.#balance = initialBalance;
                    this.#accountNumber = Account.generateAccountNumber();
                    this.#transactionHistory = [];
                    
                    this.#transactionHistory.push({
                        type: 'Initial Deposit',
                        amount: initialBalance,
                        date: new Date()
                    });
                }

                static generateAccountNumber() {
                    return Math.floor(Math.random() * 1000000000);
                }

                static showAccountTypes() {
                    log('Available Account Types:', 'info');
                    log('1. Savings Account - For saving money with interest', 'info');
                    log('2. Checking Account - For frequent transactions', 'info');
                    log('3. Business Account - For business purposes', 'info');
                }

                get balance() {
                    return this.#balance;
                }

                get accountNumber() {
                    return this.#accountNumber;
                }

                get transactions() {
                    return this.#transactionHistory;
                }

                deposit(amount) {
                    if (amount <= 0) {
                        log('❌ Deposit amount must be positive!', 'error');
                        return false;
                    }

                    this.#balance += amount;
                    this.#recordTransaction('Deposit', amount);
                    log(`✅ Deposited: Rs.${amount}. New Balance: Rs.${this.#balance}`, 'success');
                    return true;
                }

                withdraw(amount) {
                    if (amount <= 0) {
                        log('❌ Withdrawal amount must be positive!', 'error');
                        return false;
                    }

                    if (amount > this.#balance) {
                        log('❌ Insufficient balance!', 'error');
                        return false;
                    }

                    if (!this.checkWithdrawalLimit(amount)) {
                        return false;
                    }

                    this.#balance -= amount;
                    this.#recordTransaction('Withdrawal', amount);
                    log(`✅ Withdrawn: Rs.${amount}. New Balance: Rs.${this.#balance}`, 'success');
                    return true;
                }

                checkWithdrawalLimit(amount) {
                    return true;
                }

                set accountHolder(name) {
                    if (name.length < 2) {
                        log('❌ Name must be at least 2 characters!', 'error');
                        return;
                    }
                    this._accountHolder = name;
                }

                get accountHolder() {
                    return this._accountHolder;
                }

                #recordTransaction(type, amount) {
                    this.#transactionHistory.push({
                        type: type,
                        amount: amount,
                        date: new Date(),
                        balanceAfter: this.#balance
                    });
                }

                displayAccountInfo() {
                    log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                    log(`Account Type: ${this.constructor.name}`, 'info');
                    log(`Account Holder: ${this.accountHolder}`, 'info');
                    log(`Account Number: ${this.#accountNumber}`, 'info');
                    log(`Current Balance: Rs.${this.#balance}`, 'success');
                    log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                }

                displayTransactionHistory() {
                    log(`📋 Transaction History for ${this.accountHolder}:`, 'section');
                    log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                    this.#transactionHistory.forEach((transaction, index) => {
                        log(`${index + 1}. ${transaction.type} - Rs.${transaction.amount}`, 'info');
                    });
                    log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                }
            }

            // ========== STEP 2: SavingsAccount (Child Class) ==========
            class SavingsAccount extends Account {
                #interestRate;

                constructor(accountHolder, initialBalance, interestRate = 5) {
                    super(accountHolder, initialBalance);
                    this.#interestRate = interestRate;
                }

                get interestRate() {
                    return this.#interestRate;
                }

                checkWithdrawalLimit(amount) {
                    const monthlyLimit = 50000;
                    if (amount > monthlyLimit) {
                        log(`❌ Withdrawal limit exceeded! Monthly limit: Rs.${monthlyLimit}`, 'error');
                        return false;
                    }
                    return true;
                }

                addInterest() {
                    const interestAmount = (this.balance * this.#interestRate) / 100;
                    this.deposit(interestAmount);
                    log(`💰 Interest Added: Rs.${interestAmount} at ${this.#interestRate}% rate`, 'success');
                }

                displayAccountInfo() {
                    super.displayAccountInfo();
                    log(`Interest Rate: ${this.#interestRate}%`, 'info');
                }
            }

            // ========== STEP 3: CheckingAccount (Child Class) ==========
            class CheckingAccount extends Account {
                #overdraftLimit;

                constructor(accountHolder, initialBalance, overdraftLimit = 10000) {
                    super(accountHolder, initialBalance);
                    this.#overdraftLimit = overdraftLimit;
                }

                get overdraftLimit() {
                    return this.#overdraftLimit;
                }

                checkWithdrawalLimit(amount) {
                    if (amount > this.balance + this.#overdraftLimit) {
                        log(`❌ Overdraft limit exceeded!`, 'error');
                        return false;
                    }
                    return true;
                }

                displayAccountInfo() {
                    super.displayAccountInfo();
                    log(`Overdraft Limit: Rs.${this.#overdraftLimit}`, 'info');
                }
            }

            // ========== STEP 4: BusinessAccount (Child Class) ==========
            class BusinessAccount extends Account {
                #transactionFee;
                #signatories;

                constructor(accountHolder, initialBalance, transactionFee = 50, signatories = []) {
                    super(accountHolder, initialBalance);
                    this.#transactionFee = transactionFee;
                    this.#signatories = signatories;
                }

                get signatories() {
                    return this.#signatories;
                }

                addSignatory(name) {
                    this.#signatories.push(name);
                    log(`✅ Signatory ${name} added`, 'success');
                }

                withdraw(amount) {
                    const totalDebit = amount + this.#transactionFee;

                    if (totalDebit > this.balance) {
                        log('❌ Insufficient balance (including transaction fee)!', 'error');
                        return false;
                    }

                    log(`📌 Transaction Fee Applied: Rs.${this.#transactionFee}`, 'info');
                    return super.withdraw(amount);
                }

                displayAccountInfo() {
                    super.displayAccountInfo();
                    log(`Transaction Fee: Rs.${this.#transactionFee}`, 'info');
                    log(`Signatories: ${this.#signatories.join(', ') || 'None'}`, 'info');
                }
            }

            // ========== STEP 5: Bank Class ==========
            class Bank {
                #accounts;

                constructor(bankName) {
                    this.bankName = bankName;
                    this.#accounts = [];
                }

                createAccount(type, accountHolder, initialBalance, specialParam = null) {
                    let account;

                    if (type === 'savings') {
                        account = new SavingsAccount(accountHolder, initialBalance, specialParam || 5);
                    } else if (type === 'checking') {
                        account = new CheckingAccount(accountHolder, initialBalance, specialParam || 10000);
                    } else if (type === 'business') {
                        account = new BusinessAccount(accountHolder, initialBalance, specialParam || 50);
                    }

                    this.#accounts.push(account);
                    log(`✅ ${type.toUpperCase()} account created for ${accountHolder}`, 'success');
                    return account;
                }

                getTotalBalance() {
                    return this.#accounts.reduce((sum, account) => sum + account.balance, 0);
                }

                displayAllAccounts() {
                    log(`📊 ${this.bankName} - All Accounts`, 'header');
                    this.#accounts.forEach(account => account.displayAccountInfo());
                }
            }

            // ========== DEMONSTRATION ==========
            log('🏦 WELCOME TO BANK MANAGEMENT SYSTEM', 'header');
            log('', 'normal');
            
            Account.showAccountTypes();
            log('', 'normal');

            const myBank = new Bank('TechBank');

            log('📝 Creating Accounts...', 'section');
            log('', 'normal');
            const savingsAcc = myBank.createAccount('savings', 'Ali Ahmed', 50000, 4);
            const checkingAcc = myBank.createAccount('checking', 'Fatima Khan', 30000, 15000);
            const businessAcc = myBank.createAccount('business', 'ABC Corporation', 100000, 100);

            log('', 'normal');
            log('👥 Adding Business Signatories...', 'section');
            log('', 'normal');
            businessAcc.addSignatory('CEO');
            businessAcc.addSignatory('CFO');

            log('', 'normal');
            log('📋 ACCOUNT DETAILS:', 'header');
            log('', 'normal');
            savingsAcc.displayAccountInfo();
            log('', 'normal');
            checkingAcc.displayAccountInfo();
            log('', 'normal');
            businessAcc.displayAccountInfo();
            log('', 'normal');

            log('💳 PERFORMING TRANSACTIONS:', 'header');
            log('', 'normal');
            log('--- Savings Account ---', 'section');
            savingsAcc.deposit(10000);
            savingsAcc.withdraw(5000);
            savingsAcc.addInterest();

            log('', 'normal');
            log('--- Checking Account ---', 'section');
            checkingAcc.deposit(20000);
            checkingAcc.withdraw(40000);

            log('', 'normal');
            log('--- Business Account ---', 'section');
            businessAcc.deposit(50000);
            businessAcc.withdraw(25000);

            log('', 'normal');
            log('📊 TRANSACTION HISTORY:', 'header');
            log('', 'normal');
            savingsAcc.displayTransactionHistory();
            log('', 'normal');

            log('', 'normal');
            myBank.displayAllAccounts();

            log('', 'normal');
            log(`💰 Total Bank Balance: Rs.${myBank.getTotalBalance()}`, 'success');
            log('', 'normal');
            log('🏦 Thank you for using TechBank!', 'header');
        }

        // Run project on page load
        window.addEventListener('load', runProject);
    </script>
</body>
</html>
